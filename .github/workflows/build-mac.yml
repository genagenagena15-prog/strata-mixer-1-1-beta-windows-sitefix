name: Build macOS DMG

# Run manually from the GitHub "Actions" tab → "Run workflow".
on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build renderer (Vite)
        run: npm run build

      - name: Prepare bundled FFmpeg
        run: npm run prepare-ffmpeg

      - name: Build macOS DMG (Apple Silicon)
        run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          # No Apple Developer certificate — build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrataMixer-macOS-dmg
          path: release-installer/*.dmg
          if-no-files-found: error
